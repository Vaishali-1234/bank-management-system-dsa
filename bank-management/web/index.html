<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Management System — DSA Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────────── -->
<div class="screen active" id="s-login">
  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-grid"></div>
    <div class="login-box">
      <div class="login-logo">
        <div class="login-logo-icon">🏦</div>
        <div>
          <div class="login-title">BankDSA</div>
          <div class="login-sub">MANAGEMENT SYSTEM · v1.0</div>
        </div>
      </div>
      <div class="field">
        <label>ROLE</label>
        <select id="login-role" onchange="updateHint()">
          <option value="admin">Admin</option>
          <option value="staff">Staff</option>
          <option value="atm">ATM / Customer</option>
        </select>
      </div>
      <div class="field">
        <label>PASSWORD / PIN</label>
        <input type="password" id="login-pass" placeholder="Enter credentials"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div id="login-hint" class="text-sm mb-1" style="margin-bottom:14px">
        Admin: admin123 &nbsp;·&nbsp; Staff: staff123
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Sign in →</button>
      <div id="login-msg"></div>
    </div>
  </div>
</div>

<!-- ── DASHBOARD SHELL ─────────────────────────────────────────────────────── -->
<div class="screen" id="s-dash">
  <div class="app">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-icon">🏦</div>
        <div>
          <div class="brand-name">BankDSA</div>
          <div class="brand-sub" id="role-badge">ADMIN</div>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">MENU</div>
        <div id="nav-links"></div>
      </div>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="user-avatar">AD</div>
          <div>
            <div class="user-name" id="user-name">Admin</div>
            <div class="user-role" id="user-role">admin</div>
          </div>
        </div>
        <button class="btn btn-full" style="margin-top:8px;font-size:12px" onclick="logout()">
          Sign out
        </button>
      </div>
    </div>
    <div class="main" id="main-content"></div>
  </div>
</div>

<!-- ── Scripts (load order matters) ──────────────────────────────────────── -->
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script src="js/staff.js"></script>
<script src="js/atm.js"></script>
<script src="js/app.js"></script>

</body>
</html>
